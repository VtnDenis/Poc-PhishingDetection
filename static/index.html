<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Phishing Detector</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="container">
    <section class="card" role="region" aria-labelledby="title">
      <h1 id="title">Phishing Detector</h1>
      <p class="lead">Paste an email or message below and click Predict.</p>

      <label for="emailInput" class="sr-only">Email text</label>
      <textarea id="emailInput" placeholder="Paste email text here..." maxlength="10000" rows="10" aria-describedby="charCount"></textarea>

      <div class="controls">
        <div id="charCount" class="char-count">0 / 10000</div>
        <button id="predictBtn" class="btn" type="button" disabled>
          <span id="btnText">Predict</span>
          <span id="spinner" class="spinner" aria-hidden="true"></span>
        </button>
      </div>

      <div class="examples" aria-label="Example templates">
        <div class="examples-label">Examples:</div>
        <div class="examples-list">
          <div class="examples-group">
            <div class="group-title">Phishing examples</div>
            <button type="button" class="example-btn phish" data-sample="Urgent: Your account will be suspended. Click here to verify your information: http://verify.example/login">Account suspension</button>
            <button type="button" class="example-btn phish" data-sample="You have received a refund of $199. Verify your details and claim here: http://claim.example">Refund offer</button>
            <button type="button" class="example-btn phish" data-sample="Congratulations! You won an iPhone. Confirm your details here: http://win.example">Winner notification</button>
          </div>
          <div class="examples-group">
            <div class="group-title">Legitimate examples</div>
            <button type="button" class="example-btn legit" data-sample="Order Confirmation: Your order #12345 has shipped. Track at https://shipping.example/track/12345">Order confirmation</button>
            <button type="button" class="example-btn legit" data-sample="Bank Notice: Your March statement is ready. Log in to your bank portal to view your transactions.">Bank statement notice</button>
            <button type="button" class="example-btn legit" data-sample="HR: Reminder - company town hall tomorrow at 10:00 AM. Attendance requested.">Internal HR notice</button>
          </div>
        </div>
      </div>

      <div id="result" class="result hidden" aria-live="polite">
        <div id="resultLabel" class="result-label"></div>
        <div class="probability">
          <div class="progress" aria-hidden="true">
            <div id="probBar" class="progress-bar" style="width:0%"></div>
          </div>
          <div id="probText" class="prob-text"></div>
        </div>
        <button id="clearBtn" class="link-btn">Clear</button>
      </div>
    </section>
    <footer class="footer">Model: XGBoost + TF‑IDF — demo • Front‑end generated by AI</footer>
  </main>
  <script src="/static/app.js" defer></script>
</body>
</html>
